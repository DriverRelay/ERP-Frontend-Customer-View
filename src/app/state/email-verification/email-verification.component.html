<div class="flex min-h-full flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2 class="mt-6 text-center text-2xl/9 font-bold tracking-tight text-gray-900">Email verifizieren</h2>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-[480px]">
    <div class="bg-white px-6 py-12 shadow-sm sm:rounded-lg sm:px-12">
      <form class="space-y-6" action="#" method="POST">

        <div>
          <label for="code" class="block text-sm/6 font-medium text-gray-900">Verifizierungscode <span class="text-red-600">*</span></label>
          <div class="mt-2">
            <input type="text" maxlength="6" name="code" id="code" required class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6" placeholder="z.B. 123456">
          </div>
        </div>

        <div>
          <button type="submit" class="flex w-full justify-center rounded-md bg-indigo-600 px-3 py-1.5 text-sm/6 font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">Code verifizieren</button>
        </div>
      </form>

      <div>
        <div class="relative mt-10">
          <div class="absolute inset-0 flex items-center" aria-hidden="true">
            <div class="w-full border-t border-gray-200"></div>
          </div>
          <div class="relative flex justify-center text-sm/6 font-medium">
            <span class="bg-white px-6 text-gray-900">Optionen</span>
          </div>
        </div>

        <div class="mt-6 grid grid-cols-1 gap-4">
          <button class="flex w-full items-center justify-center gap-3 rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-xs ring-1 ring-gray-300 ring-inset hover:bg-gray-50 focus-visible:ring-transparent">
            <span class="text-sm/6 font-semibold">Code erneut senden</span>
          </button>
        </div>
      </div>
    </div>

    <p class="mt-10 text-center text-sm/6 text-gray-500">
      Zurück zur Registrierung?
      <a routerLink="/signup" class="font-semibold text-indigo-600 hover:text-indigo-500">Jetzt registrieren</a>
    </p>
  </div>
</div>
